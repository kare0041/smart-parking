{% extends "base.html" %}

{% block title %}Find Your Session — SmartPark Rwanda{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-md p-6 mt-4">
    <h2 class="text-xl font-bold text-gray-800 text-center mb-6">Find Your Parking Session</h2>

    {% if error %}
        <div class="mb-4 p-3 rounded-lg bg-red-100 text-red-800 border border-red-200 text-sm font-medium">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="{{ url_for('parking.lookup') }}">
        <label for="plate_number" class="block text-sm font-medium text-gray-600 mb-2">License Plate Number</label>
        <input
            type="text"
            id="plate_number"
            name="plate_number"
            value="{{ saved_plate }}"
            placeholder="e.g. RAB456C"
            autocapitalize="characters"
            autocomplete="off"
            required
            class="w-full px-4 py-3 text-lg font-mono uppercase tracking-wider border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-center"
        >
        <button
            type="submit"
            class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg text-lg transition-colors"
        >
            Look Up Session
        </button>
    </form>
</div>
{% endblock %}
